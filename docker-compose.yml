# Project Management Platform - Docker Compose for deployment
# Usage: docker compose up -d
#
# Database: set DATABASE_URL in repo root .env
# - Same DB as local: DATABASE_URL=postgresql://USER:PASS@host.docker.internal:5432/DB  then: docker compose up -d
# - New DB in Docker: DATABASE_URL=postgresql://USER:PASS@db:5432/DB  then: docker compose --profile with-db up -d

services:
  db:
    profiles:
      - with-db
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pmuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmsecret}
      POSTGRES_DB: ${POSTGRES_DB:-project_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmuser} -d ${POSTGRES_DB:-project_management}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
      # Project ports come from DB (Project.port: 8001, 8002, ...). Publish a range that covers your max project count.
      # Nginx reaches backend via Docker network (backend:PORT), so this is only for direct host access/debugging.
      # Set PROJECT_PORT_END in .env if you need more (e.g. 8999 for ~1000 projects). Omit this block to use only nginx subdomains.
      - "8001-${PROJECT_PORT_END:-8100}:8001-${PROJECT_PORT_END:-8100}"
    # So backend can reach host Postgres when DATABASE_URL uses host.docker.internal (Mac/Windows have it; Linux needs this)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      # Set in .env. Same DB as local: postgresql://USER:PASS@host.docker.internal:5432/DB. Docker DB: postgresql://USER:PASS@db:5432/DB
      DATABASE_URL: ${DATABASE_URL:-postgresql://pmuser:pmsecret@db:5432/project_management}
      INSTANCE_ROOT: /app
      BASE_URL: ${BASE_URL:-http://localhost:5000}
      NGINX_BASE_DOMAIN: ${NGINX_BASE_DOMAIN:-localhost}
      # When nginx runs in Docker, it must proxy to this host (backend service name)
      NGINX_UPSTREAM_HOST: backend
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    volumes:
      # Use host's backend/projects so path is /app/projects (INSTANCE_ROOT + "projects") and same files work locally + in Docker
      - ./backend/projects:/app/projects
      - backend_nginx_configs:/app/nginx-configs
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
        required: false

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # URL the browser will use to reach the backend API
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-http://localhost}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_nginx_configs:/etc/nginx/sites-enabled:ro
    depends_on:
      - backend
    command: [ "nginx", "-g", "daemon off;" ]

volumes:
  postgres_data:
  backend_nginx_configs:
  backend_uploads:
