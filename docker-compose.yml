# Project Management Platform - Docker Compose for deployment
# Usage: docker compose up -d
# Nginx: runs inside the backend container only — see docs/NGINX_AND_DEPLOYMENT.md
#
# Nginx runs inside the backend container only (port 80). Frontend is served with `serve` (no nginx).
# Backend image sets NGINX_BIN=/usr/sbin/nginx for Node-driven `nginx -s reload`; override via .env if needed.
# Database: set DATABASE_URL in repo root .env
# Migrations: backend entrypoint runs `prisma migrate deploy` when DATABASE_URL is set (fails startup on error).
# Same entrypoint runs a one-shot stale FeedbackRecordingSession cleanup after migrate (SKIP_FEEDBACK_SESSION_CLEANUP=1 to skip).
# Screen recording: `feedback-recording-worker` merges WebM chunks in S3 and attaches to Jira (needs AWS_* + DATABASE_URL + ffmpeg in image).
# Cursor Cloud API (optional): `cursor-cloud-agent` — Next.js CLR server on :3100; build ./cursor-cloud-agent/Dockerfile; data in cursor_cloud_agent_data.
#   Start alone: docker compose up -d cursor-cloud-agent
# - Supabase / external only: docker compose up -d  (db service is NOT started)
# - Local DB in Docker: DATABASE_URL=...@db:5432/... then: docker compose --profile with-db up -d
#
# Auth / APIs (set in repo root .env — see backend env_file + environment):
# - Cognito: AWS_COGNITO_USER_POOL_ID, AWS_COGNITO_APP_CLIENT_ID, optional AUTH_ALLOWED_DOMAIN
# - GitHub/Jira/Bitbucket OAuth: GITHUB_OAUTH_*, ATLASSIAN_OAUTH_*, BITBUCKET_OAUTH_*,
#   OAUTH_TOKEN_ENCRYPTION_KEY, optional OAUTH_STATE_SECRET
# - Hub: VITE_HUB_API_URL, optional VITE_HUB_OAUTH_REDIRECT_URL, optional VITE_HUB_PROFILE_PIC_API_KEY (frontend build args)
# - OpenAI: OPENAI_API_KEY (optional) for client-link release “what to review” summaries; OPENAI_MODEL optional
# - CORS: FRONTEND_URL should match where users open the UI (e.g. http://localhost:3000)
# - SCM push webhooks: backend uses NGROK_URL → FRONTEND_URL → VITE_FRONTEND_URL → BASE_URL (see backend/src/utils/apiPublicBaseUrl.js); VITE_FRONTEND_URL alone is enough if FRONTEND_URL is unset. Set GITHUB_PUSH_WEBHOOK_SECRET / BITBUCKET_PUSH_WEBHOOK_SECRET in .env
#
# env_file: root .env is loaded into services; optional .env.local (gitignored) overrides when present
# (Compose 2.24+ path/required syntax). If your Compose is older, remove the .env.local entry or merge into .env.

services:
  db:
    profiles:
      - with-db
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-zipsync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zipsync}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8888:80"     # Nginx inside backend — project subdomains (8888 to avoid port 80 and project range 8001-8100)
      - "443:443"     # HTTPS when SSL_DOMAIN is set and certs mounted
      - "5000:5000"   # API
      - "8001-${PROJECT_PORT_END:-8100}:8001-${PROJECT_PORT_END:-8100}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/zipsync}
      INSTANCE_ROOT: /app
      BASE_URL: ${BASE_URL:-http://localhost:5000}
      NGINX_BASE_DOMAIN: ${NGINX_BASE_DOMAIN:-localhost}
      SSL_DOMAIN: ${SSL_DOMAIN:-}
      NGINX_BIN: ${NGINX_BIN:-/usr/sbin/nginx}
      # Nginx runs in same container as Node — configs use proxy_pass http://localhost:<port>
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # --- Cognito (Hub / JWT — aws-jwt-verify) ---
      AWS_COGNITO_USER_POOL_ID: ${AWS_COGNITO_USER_POOL_ID:-}
      AWS_COGNITO_APP_CLIENT_ID: ${AWS_COGNITO_APP_CLIENT_ID:-}
      AUTH_ALLOWED_DOMAIN: ${AUTH_ALLOWED_DOMAIN:-}
      # FRONTEND_URL: set only in root .env (env_file). Do not set here — a default like localhost breaks UAT OAuth redirects.
      # Backend falls back to VITE_FRONTEND_URL when FRONTEND_URL is omitted (see backend/src/utils/publicFrontendUrl.js getPublicFrontendBaseUrl).
      # --- Optional integrations (release upload, Cursor, OpenAI client-review summary, S3) ---
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      # Do not use ${CURSOR_BASE_URL:-...} here: root .env often sets localhost:3100 for bare-metal Node; inside
      # this container localhost is the backend itself → ECONNREFUSED. Default is Compose DNS to sibling service.
      # Override with CURSOR_CLOUD_AGENT_URL (e.g. http://host.docker.internal:3100 if agent runs on host only).
      CURSOR_BASE_URL: ${CURSOR_CLOUD_AGENT_URL:-http://cursor-cloud-agent:3100}
      # Optional: force Cursor agent source.ref (branch/tag); unset uses request ref or GitHub default_branch
      CURSOR_AGENT_SOURCE_REF: ${CURSOR_AGENT_SOURCE_REF:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      # --- GitHub & Jira OAuth (stored tokens encrypted; see .env.example) ---
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY:-}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-}
      GITHUB_OAUTH_SCOPES: ${GITHUB_OAUTH_SCOPES:-}
      GITHUB_OAUTH_ALLOW_REFRESH: ${GITHUB_OAUTH_ALLOW_REFRESH:-}
      ATLASSIAN_OAUTH_CLIENT_ID: ${ATLASSIAN_OAUTH_CLIENT_ID:-}
      ATLASSIAN_OAUTH_CLIENT_SECRET: ${ATLASSIAN_OAUTH_CLIENT_SECRET:-}
      ATLASSIAN_OAUTH_REDIRECT_URI: ${ATLASSIAN_OAUTH_REDIRECT_URI:-}
      ATLASSIAN_OAUTH_SCOPES: ${ATLASSIAN_OAUTH_SCOPES:-}
      # --- Bitbucket OAuth (same pattern as GitHub/Jira; see .env.example) ---
      BITBUCKET_OAUTH_CLIENT_ID: ${BITBUCKET_OAUTH_CLIENT_ID:-}
      BITBUCKET_OAUTH_CLIENT_SECRET: ${BITBUCKET_OAUTH_CLIENT_SECRET:-}
      BITBUCKET_OAUTH_REDIRECT_URI: ${BITBUCKET_OAUTH_REDIRECT_URI:-}
      BITBUCKET_OAUTH_SCOPES: ${BITBUCKET_OAUTH_SCOPES:-}
      # --- Optional seed / defaults (backend entrypoint or app) ---
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      GITHUB_DEFAULT_COLLABORATOR: ${GITHUB_DEFAULT_COLLABORATOR:-}
    volumes:
      # Named volume: POSIX permissions/chmod work reliably (git objects, fs-extra copy). Bind-mounting
      # ./backend/projects often causes EACCES on chmod under .git/objects on Docker Desktop.
      # To use a host folder instead: replace with ./backend/projects:/app/projects:delegated and migrate data if needed.
      - backend_projects:/app/projects
      - backend_nginx_configs:/app/nginx-configs
      - backend_uploads:/app/uploads
      - /etc/letsencrypt:/etc/letsencrypt:ro   # Read-only for SSL (Certbot on host)
    depends_on:
      db:
        condition: service_healthy
        required: false
      cursor-cloud-agent:
        condition: service_started

  # Merges feedback screen-recording chunks (S3 + ffmpeg) and attaches video to Jira. Same image as backend; no nginx/migrate entrypoint.
  # Run exactly one replica (job claiming uses Postgres row locks).
  feedback-recording-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["./worker-docker-entrypoint.sh"]
    command: ["node", "src/workers/feedbackRecordingMerge.worker.js"]
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/zipsync}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY:-}
    depends_on:
      - backend

  # Cursor Cloud–compatible API (Next.js). Sessions/workdirs persist under /root/.cursor-local-remote.
  # Set AUTH_TOKEN, GITHUB_PAT_TOKEN (private HTTPS git), CLOUD_API_KEY_ENCRYPTION_SECRET in root .env as needed.
  # Dockerfile CMD uses --log (HTTP). Logs: [cloud-agent:run] agent lifecycle, [cloud-agent:git] clone/publish/push.
  # CLR_CLOUD_AGENT_LOG=0 silences both; CLR_RUN_LOG=0 or CLR_GIT_LOG=0 silences one channel.
  cursor-cloud-agent:
    build:
      context: ./cursor-cloud-agent
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3100:3100"
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 3100
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      GITHUB_PAT_TOKEN: ${GITHUB_PAT_TOKEN:-}
      CURSOR_TRUST: ${CURSOR_TRUST:-}
      CLOUD_API_KEY_ENCRYPTION_SECRET: ${CLOUD_API_KEY_ENCRYPTION_SECRET:-}
      # Commits from cloud agent use GIT_AUTHOR_* (defaults match code; override for your org)
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-Cursor Cloud Agent}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-cursor-cloud-agent@localhost}
      # CLR_GIT_LOG: ${CLR_GIT_LOG:-}  # unset = log git clone/fetch/push; set to 0 to silence
    volumes:
      - cursor_cloud_agent_data:/root/.cursor-local-remote
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    # VITE_* build args use variables from the repo root .env (Compose loads it for ${...} substitution).
    # Do not use env_file here — that would inject DB/JWT secrets into the static frontend container.
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-http://localhost:5173}
        VITE_MODE: ${VITE_MODE:-production}
        VITE_HUB_API_URL: ${VITE_HUB_API_URL:-}
        VITE_HUB_OAUTH_REDIRECT_URL: ${VITE_HUB_OAUTH_REDIRECT_URL:-}
        VITE_HUB_PROFILE_PIC_API_KEY: ${VITE_HUB_PROFILE_PIC_API_KEY:-}
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      # Project dev servers (8001–8100) run in the backend container; proxy iframe URLs there
      IFRAME_PREVIEW_HOST: http://backend
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_projects:
  backend_nginx_configs:
  backend_uploads:
  cursor_cloud_agent_data:
