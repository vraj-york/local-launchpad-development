# Project Management Platform - Docker Compose for deployment
# Usage: docker compose up -d
#
# Nginx runs inside the backend container only (port 80). Frontend is served with `serve` (no nginx).
# Database: set DATABASE_URL in repo root .env
# - Supabase / external only: docker compose up -d  (db service is NOT started)
# - Local DB in Docker: DATABASE_URL=...@db:5432/... then: docker compose --profile with-db up -d
#
# Auth / APIs (set in repo root .env — also listed under backend.environment for visibility):
# - Cognito: AWS_COGNITO_USER_POOL_ID, AWS_COGNITO_APP_CLIENT_ID, optional AUTH_ALLOWED_DOMAIN
# - Hub: VITE_HUB_API_URL, optional VITE_HUB_OAUTH_REDIRECT_URL, optional VITE_HUB_PROFILE_PIC_API_KEY (frontend build args)
# - CORS: FRONTEND_URL should match where users open the UI (e.g. http://localhost:3000)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-zipsync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zipsync}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8888:80"     # Nginx inside backend — project subdomains (8888 to avoid port 80 and project range 8001-8100)
      - "443:443"     # HTTPS when SSL_DOMAIN is set and certs mounted
      - "5000:5000"   # API
      - "8001-${PROJECT_PORT_END:-8100}:8001-${PROJECT_PORT_END:-8100}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/zipsync}
      INSTANCE_ROOT: /app
      BASE_URL: ${BASE_URL:-http://localhost:5000}
      NGINX_BASE_DOMAIN: ${NGINX_BASE_DOMAIN:-localhost}
      SSL_DOMAIN: ${SSL_DOMAIN:-}
      # Nginx runs in same container as Node — configs use proxy_pass http://localhost:<port>
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # --- Cognito (Hub / JWT — aws-jwt-verify) ---
      AWS_COGNITO_USER_POOL_ID: ${AWS_COGNITO_USER_POOL_ID:-}
      AWS_COGNITO_APP_CLIENT_ID: ${AWS_COGNITO_APP_CLIENT_ID:-}
      AUTH_ALLOWED_DOMAIN: ${AUTH_ALLOWED_DOMAIN:-}
      # --- CORS / cookie-related redirects (backend src/app.js) ---
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # --- Optional integrations (release upload, Cursor, S3) ---
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      # Optional: force Cursor agent source.ref (branch/tag); unset uses request ref or GitHub default_branch
      CURSOR_AGENT_SOURCE_REF: ${CURSOR_AGENT_SOURCE_REF:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_USERNAME: ${GITHUB_USERNAME:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    volumes:
      - ./backend/projects:/app/projects
      - backend_nginx_configs:/app/nginx-configs
      - backend_uploads:/app/uploads
      - /etc/letsencrypt:/etc/letsencrypt:ro   # Read-only for SSL (Certbot on host)
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-http://localhost:3000}
        VITE_MODE: ${VITE_MODE:-production}
        VITE_HUB_API_URL: ${VITE_HUB_API_URL:-}
        VITE_HUB_OAUTH_REDIRECT_URL: ${VITE_HUB_OAUTH_REDIRECT_URL:-}
        VITE_HUB_PROFILE_PIC_API_KEY: ${VITE_HUB_PROFILE_PIC_API_KEY:-}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_nginx_configs:
  backend_uploads:
