# Main nginx config for Docker Compose nginx service.
# Per-project server blocks are mounted from the backend volume at /etc/nginx/sites-enabled/
# (backend writes nginx-configs/*.conf into that volume).

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Default server so nginx starts even before any project configs exist
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # Per-project configs (proxy_pass to backend:<port>); volume may be empty at first
    include /etc/nginx/sites-enabled/*.conf;
}
