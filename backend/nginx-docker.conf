# Nginx main config when running inside backend container only.
# Per-project configs live in /app/nginx-configs/ (volume). proxy_pass targets 127.0.0.1 (same container).

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # Must appear before any server_name and before include /app/nginx-configs/*.conf (alphabetical
    # order loads _placeholder.conf and project *.conf before ssl.conf). Otherwise default 64 causes:
    # could not build server_names_hash, you should increase server_names_hash_bucket_size
    server_names_hash_bucket_size 256;
    server_names_hash_max_size 2048;

    # If Referer contains /iframe-preview/, send request to backend so iframe proxy can forward to project port
    map $http_referer $iframe_referer {
        default 0;
        "~*\/iframe-preview\/" 1;
    }

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log  /var/log/nginx/access.log;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    include /app/nginx-configs/*.conf;
}
